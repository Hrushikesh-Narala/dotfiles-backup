<?xml version='1.0'?>
<!DOCTYPE fontconfig SYSTEM 'urn:fontconfig:fonts.dtd'>
<fontconfig>
 <!-- Synthesize TH Sarabun with scaled-down Laksaman -->
 <match target="pattern">
  <test compare="contains" name="family" qual="any">
   <string>TH Sarabun</string>
  </test>
  <edit binding="same" mode="append" name="family">
   <string>Laksaman</string>
  </edit>
 </match>
 <match target="font">
  <test compare="eq" name="family">
   <string>Laksaman</string>
  </test>
  <test compare="contains" name="family" qual="any" target="pattern">
   <string>TH Sarabun</string>
  </test>
  <edit mode="assign" name="matrix">
   <matrix>
    <double>0.66</double>
    <double>0</double>
    <double>0</double>
    <double>0.66</double>
   </matrix>
  </edit>
 </match>
 <match target="font">
  <edit mode="assign" name="hinting">
   <bool>true</bool>
  </edit>
 </match>
 <match target="font">
  <edit mode="assign" name="hintstyle">
   <const>hintslight</const>
  </edit>
 </match>
 <match target="font">
  <edit mode="assign" name="antialias">
   <bool>true</bool>
  </edit>
 </match>
</fontconfig>
