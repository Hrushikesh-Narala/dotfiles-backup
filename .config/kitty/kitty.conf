font_family JetBrainsMono Nerd Font
font_size 12.0
hide_window_decorations yes
shell zsh -c 'tmux new -A -s main; exec zsh'

background_blur 1
background_image /home/alienx/Pictures/aaa.jpg
background_image_layout tiled
background_tint 0.99
background_opacity 0.90
dynamic_background_opacity yes

map ctrl+c copy_or_interrupt
map ctrl+v paste_from_clipboard
map page_up scroll_page_up
map page_down scroll_page_down
map ctrl+backspace send_text all \x17
map ctrl+delete send_text all \e[3;5~
map ctrl+left send_text all \e[1;5D
map ctrl+right send_text all \e[1;5C
map ctrl+shift+left send_text all \e[1;6D
map ctrl+shift+right send_text all \e[1;6C
map shift+enter send_text all \e\r
